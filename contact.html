    <h2 id="order-title" style="text-align:center; color:#1a3a7a;">Contact Form</h2>

    <div id="order-form-container">
      <form id="contact-form" action="#" method="post">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Your Message:</label>
        <textarea id="message" name="message" rows="4" required></textarea>

        <button type="submit">Submit</button>
      </form>
    </div>

    <div id="thank-you-message" class="hidden" style="text-align:center; color:#1a3a7a; font-size: 35px; font-weight:bold;">
      Thank you for your message! I will read soon.
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('contact-form');
      const thankYou = document.getElementById('thank-you-message');
      const orderFormContainer = document.getElementById('order-form-container');
      const orderTitle = document.getElementById('order-title');

      form.addEventListener('submit', function (e) {
        e.preventDefault(); // prevent actual submission

        // Hide the form and title
        orderFormContainer.style.display = 'none';
        orderTitle.style.display = 'none';

        // Show thank you message
        thankYou.classList.remove('hidden');

        // Reset the form (optional here since form is hidden)
        form.reset();
      });
    });
  </script>
