   /* Reset CSS */
  * {
    margin: 0; padding: 0; box-sizing: border-box;

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f7fa;

/* --- Header --- */
.header {
  position: relative;
  height: 100vh;
  background: url('habibi.jpeg') no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  padding: 0 20px;
  flex-direction: column;
  overflow: hidden;
}

/* Dark overlay */
.header::after {
  content: '';
  position: absolute;
  inset: 0;
  background-color: rgba(0, 0, 0, 0.55);
  z-index: 1;
}

/* Inner content */
.header .content {
  position: relative;
  max-width: 900px;
  z-index: 2;
}

/* Title */
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 15px;
}

/* Paragraph */
.header p {
  font-size: 1.2rem;
  margin-bottom: 25px;
  letter-spacing: 1px;
}

/* Button */
.header a.btn-primary {
  padding: 12px 30px;
  background: #6F826A;
  color: white;
  border-radius: 50px;
  font-size: 1rem;
  text-decoration: none;
  font-weight: 600;
  transition: background-color 0.3s ease;
}

.header a.btn-primary:hover {
  animation: pulse 0.6s ease infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* --- Desktop view --- */
@media (min-width: 768px) {
  .header h1 {
    font-size: 3rem;
  }

  .header p {
    font-size: 1.5rem;
  }

  .header a.btn-primary {
    font-size: 1.2rem;
    padding: 14px 40px;
  }}

  /* --- Navigation --- */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.95);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    z-index: 999;
    font-weight: 600;
  }

  nav .container {
    max-width: 1200px;
    margin: auto;
    padding: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 60px;
  }

  nav .logo {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.4rem;
    color: #000000;
    cursor: pointer;
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 30px;
  }

  nav ul li a {
    text-decoration: none;
    color: #333;
    padding: 8px 10px;
    transition: color 0.3s ease;
  }

  nav ul li a:hover,
  nav ul li a.active {
    color: #6F826A;
    border-bottom: 2px solid #B2CD9C;
  }

}
/* Hidden class to hide the thank you message initially */

#order-form-container {

    display: none !important;

 /* --- Footer --- */

/* --- Toggle --- */
/* Hide hamburger by default */
.menu-toggle {
  display: none;
  font-size: 2rem;
  cursor: pointer;
  user-select: none;
}
    /* On small screens */
    @media (max-width: 768px) {

    display: none; /* Hide menu by default */

  }

  }

    margin: 10px 0;
    text-align: center;
  }

    display: block; /* Show hamburger */
  }}

    <h2 id="order-title" style="text-align:center; color: #6F826A;">Contact Form</h2>

        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Your Message:</label>
        <textarea id="message" name="message" rows="4" required></textarea>

        <button type="submit">Submit</button>
      </form>
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('contact-form');
      const thankYou = document.getElementById('thank-you-message');
      const orderFormContainer = document.getElementById('order-form-container');
      const orderTitle = document.getElementById('order-title');

      form.addEventListener('submit', function (e) {
        e.preventDefault(); // prevent actual submission

        // Hide the form and title
        orderFormContainer.style.display = 'none';
        orderTitle.style.display = 'none';

        // Show thank you message
        thankYou.classList.remove('hidden');

        // Reset the form (optional here since form is hidden)
        form.reset();
      });
      const menuToggle = document.getElementById('menu-toggle');
  const navMenu = document.getElementById('nav-menu');

  menuToggle.addEventListener('click', () => {
    navMenu.classList.toggle('show');
  });
    });
