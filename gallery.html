  <style>
    /* Reset CSS */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f5f7fa;
    color: #222;
    line-height: 1.6;
  }
/* --- Header --- */
.header {
  position: relative;
  height: 100vh;
  background: url('habibi.jpeg') no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  padding: 0%;
  flex-direction: column;
  overflow: hidden;
}

/* Dark overlay */
.header::after {
  content: '';
  position: absolute;
  inset: 0;
  background-color: rgba(0, 0, 0, 0.55);
  z-index: 1;
}

/* Inner content */
.header .content {
  position: relative;
  max-width: 900px;
  z-index: 2;
}

/* Title */
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
}

/* Paragraph */
.header p {
  font-size: 1.2rem;
  margin-bottom: 25px;
  letter-spacing: 1px;
}

/* Button */
.header a.btn-primary {
  padding: 1%;
  background: #6F826A;
  color: white;
  border-radius: 50px;
  font-size: 1rem;
  text-decoration: none;
  font-weight: 600;
  transition: background-color 0.3s ease;
}

.header a.btn-primary:hover {
  animation: pulse 0.6s ease infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* --- Desktop view --- */
@media (min-width: 768px) {
  .header h1 {
    font-size: 3rem;
  }

  .header p {
    font-size: 1.5rem;
  }

  .header a.btn-primary {
    font-size: 1.2rem;
    padding: 14px 40px;
  }}

  /* --- Navigation --- */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.95);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    z-index: 999;
    font-weight: 600;
  }

  nav .container {
    max-width: 1200px;
    margin: auto;
    padding: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 60px;
  }

  nav .logo {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.4rem;
    color: #000000;
    cursor: pointer;
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 30px;
  }

  nav ul li a {
    text-decoration: none;
    color: #333;
    padding: 8px 10px;
    transition: color 0.3s ease;
  }

  nav ul li a:hover,
  nav ul li a.active {
    color: #6F826A;
    border-bottom: 2px solid #B2CD9C;
  }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }
    h3.section-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 30px;
      padding: 0%;
      margin: 0%;
      color: #73946B;
      text-align: center;
      padding-bottom: 5px;
      display: inline-block;
    }
    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 15px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .gallery-item {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(38, 70, 145, 0.1);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .gallery-item:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 28px rgba(38, 70, 145, 0.25);
    }
    .gallery-item img, 
    .gallery-item video {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }
    .caption {
      padding: 12px 15px;
      font-size: 1rem;
      color: #73946B;
      font-family: 'Merriweather', serif;
      text-align: center;
    }
/* --- Footer --- */
  footer {
    background: #6F826A;
    color: #ffffff;
    padding: 15px 15px;
    text-align: center;
    font-size: 0.9rem;
  }

  footer a {
    color: #000000;
    text-decoration: none;
    margin: 0 10px;
    font-weight: 600;
  }
  /* --- Responsive --- */
  @media (max-width: 900px) {
    #intro {
      flex-direction: column;
    }

    #intro img {
      max-width: 90%;
    }
  }

  @media (max-width: 600px) {
    nav ul {
      gap: 15px;
    }

    header h1 {
      font-size: 2.8rem;
    }

    header p {
      font-size: 1.1rem;
    }}

/* --- Toggle --- */
/* Hide hamburger by default */
.menu-toggle {
  display: none;
  font-size: 2rem;
  cursor: pointer;
  user-select: none;
}
    /* On small screens */
    @media (max-width: 768px) {
    nav ul {
    display: none; /* Hide menu by default */
    flex-direction: column;
    background: #B2CD9C;
    position: absolute;
    top: 60px; /* below nav bar */
    left: 0;
    right: 0;
    padding: 10px 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  nav ul.show {
    display: flex; /* Show menu when toggled */
  }

  nav ul li {
    margin: 10px 0;
    text-align: center;
  }

  .menu-toggle {
    display: block; /* Show hamburger */
  }
    }
  </style>
