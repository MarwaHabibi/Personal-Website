  /* Reset CSS */
  * {
    margin: 0; padding: 0; box-sizing: border-box;

@import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@400;600&display=swap');
  body {
    font-family: Arial, Helvetica, sans-serif;

/* --- Header --- */
.header {
  position: relative;
  height: 100vh;
  background: url('habibi.jpeg') no-repeat center center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  padding: 0 20px;
  flex-direction: column;
  overflow: hidden;
}

/* Dark overlay */
.header::after {
  content: '';
  position: absolute;
  inset: 0;
  background-color: rgba(0, 0, 0, 0.55);
  z-index: 1;
}

/* Inner content */
.header .content {
  position: relative;
  max-width: 900px;
  z-index: 2;
}

/* Title */
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 15px;
}

/* Paragraph */
.header p {
  font-size: 1.2rem;
  margin-bottom: 25px;
  letter-spacing: 1px;
}

/* Button */
.header a.btn-primary {
  padding: 12px 30px;
  background: #6F826A;
  color: white;
  border-radius: 50px;
  font-size: 1rem;
  text-decoration: none;
  font-weight: 600;
  transition: background-color 0.3s ease;
}

.header a.btn-primary:hover {
  animation: pulse 0.6s ease infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* --- Desktop view --- */
@media (min-width: 768px) {
  .header h1 {
    font-size: 3rem;
  }

  .header p {
    font-size: 1.5rem;
  }

  .header a.btn-primary {
    font-size: 1.2rem;
    padding: 14px 40px;
  }}

  /* --- Navigation --- */
  nav {
    position: fixed;

    z-index: 999;
    font-weight: 600;

  nav .container {

  nav .logo {

a.styled-link {
  position: absolute;
  background: linear-gradient(135deg, #388e3c, #81c784);
  color: white !important;
  font-weight: 600;
  padding: 10px 30px;
  border-radius: 35px;
  text-decoration: none !important;
  font-size: 1.05rem;
  box-shadow: 0 6px 12px rgba(56, 142, 60, 0.4);
  transition: background 0.4s ease, box-shadow 0.3s ease, transform 0.3s ease;
  z-index: 1;
}

a.styled-link::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 110%;
  height: 110%;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 50%;
  transform: translate(-50%, -50%) scale(0);
  transition: transform 0.4s ease;
  z-index: -1;
}

a.styled-link:hover,
a.styled-link:focus {
  background: linear-gradient(135deg, #66bb6a, #a5d6a7);
  box-shadow: 0 12px 20px rgba(102, 187, 106, 0.6);
  transform: translateY(-6px);
}

a.styled-link:hover::before {
  transform: translate(-50%, -50%) scale(1);
}

a.btn-primary {

  <script>
  const menuToggle = document.getElementById('menu-toggle');
  const navMenu = document.getElementById('nav-menu');

  menuToggle.addEventListener('click', () => {
    navMenu.classList.toggle('show');
  });
  function adjustLinksForMobile() {
  const main = document.querySelector('main');
  const links = document.querySelectorAll('a.styled-link');

  if (window.innerWidth <= 600) {
    main.style.display = 'flex';
    main.style.flexDirection = 'column';
    main.style.alignItems = 'center';
    main.style.height = 'auto';
    main.style.padding = '20px 15px';

    links.forEach(link => {
      link.style.position = 'static';
      link.style.width = '80%';
      link.style.maxWidth = '300px';
      link.style.marginBottom = '10px';
      link.style.transform = 'none';
      link.style.textAlign = 'center';
      link.classList.add('no-hover-effect'); // اضافه کردن کلاس غیرفعال کننده انیمیشن
    });
  } else {
    main.style.display = 'block';
    main.style.height = '280px';
    main.style.padding = '60px 30px';

    links.forEach(link => {
      link.style.position = 'absolute';
      link.style.width = '';
      link.style.maxWidth = '';
      link.style.marginBottom = '';
      link.style.transform = '';
      link.style.textAlign = '';
      link.classList.remove('no-hover-effect'); // حذف کلاس
    });
  }
}

window.addEventListener('load', adjustLinksForMobile);
window.addEventListener('resize', adjustLinksForMobile);

</script>
